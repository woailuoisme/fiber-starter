type_system: "database/sql"
tags: ["db", "json"]
no_tests: true
no_back_referencing: true
struct_tag_casing: "snake"

plugins_preset: "default"
plugins:
  dbinfo:
    disabled: false
    pkgname: "dbinfo"
    destination: "internal/db/gen/sqlite/dbinfo"
  enums:
    disabled: false
    pkgname: "enums"
    destination: "internal/db/gen/sqlite/enums"
  models:
    disabled: false
    pkgname: "models"
    destination: "internal/db/gen/sqlite/models"
  dberrors:
    disabled: false
    pkgname: "dberrors"
    destination: "internal/db/gen/sqlite/dberrors"
  factory:
    disabled: true
    pkgname: "factory"
    destination: "internal/db/gen/sqlite/factory"
  queries:
    disabled: true
    pkgname: "queries"
    destination: "internal/db/gen/sqlite/queries"

sqlite:
  driver: "github.com/mattn/go-sqlite3"
