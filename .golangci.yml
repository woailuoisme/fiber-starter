# https://golangci-lint.run/
# Configuration for golangci-lint v2.

version: "2"

run:
  timeout: 5m
  tests: false
  allow-parallel-runners: true

output:
  sort-order:
    - file
    - linter

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused

    - gosec

  settings:
    gosec:
      excludes:
        - G104 # unchecked errors are handled by errcheck

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
