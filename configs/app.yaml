app:
  name: "Lunchbox Vending API"
  env: "local"
  debug: true
  port: "3000"
  host: "0.0.0.0"
  timezone: "Asia/Shanghai"
  url: "http://localhost:3000"

  fiber:
    prefork: false
    server_header: ""
    body_limit: 4194304
    concurrency: 262144
    read_buffer_size: 16384

jwt:
  secret: "your-secret-key-change-in-production-environment"
  expiration_time: 3600
  refresh_time: 604800
  issuer: "lunchbox-vending-api"

redis:
  host: "localhost"
  port: "6379"
  password: ""
  db: 0

logger:
  level: "info"
  format: "text"
  output: "stdout"
  max_size: 100
  max_age: 30
  max_backups: 10
  compress: true

cache:
  driver: "redis"
  prefix: "lunchbox:"
  default: 3600
  ttl: 3600

mail:
  from_name: "Lunchbox Vending"
  from_address: "noreply@lunchbox.com"
  reply_to: ""
  api_key: ""

queue:
  concurrency: 10

storage:
  driver: "garage"
  database: "./storage/storage.db"
  reset: false
  gc_interval: 10
  garage:
    endpoint: "localhost:9000"
    access_key_id: "garageadmin"
    secret_access_key: "garageadmin"
    use_ssl: false
    bucket: "lunchbox-media"
    region: "us-east-1"
  s3:
    access_key_id: ""
    secret_access_key: ""
    region: "us-east-1"
    bucket: "lunchbox-media"
    endpoint: ""
  r2:
    access_key_id: ""
    secret_access_key: ""
    region: "auto"
    bucket: "lunchbox-media"
    endpoint: "https://<accountid>.r2.cloudflarestorage.com"
  oss:
    access_key_id: ""
    secret_access_key: ""
    region: "oss-cn-hangzhou"
    bucket: "lunchbox-media"
    endpoint: "oss-cn-hangzhou.aliyuncs.com"

websocket:
  port: "3001"
  path: "/ws"
  heartbeat_interval: 30

payment:
  wechat:
    app_id: ""
    mch_id: ""
    api_key: ""
    cert_path: ""
    key_path: ""
    notify_url: ""
  alipay:
    app_id: ""
    private_key: ""
    public_key: ""
    notify_url: ""

business:
  order:
    payment_timeout: 30
    pickup_timeout: 1440
  device:
    channel_count: 53
    channel_max_capacity: 4

meilisearch:
  host: "http://localhost:7700"
  api_key: ""

security:
  cors:
    allowed_origins: "*"
    allowed_methods: "GET,POST,PUT,DELETE,OPTIONS"
    allowed_headers: "Origin,Content-Type,Accept,Authorization"
  rate_limit:
    max: 60
    window: 60
