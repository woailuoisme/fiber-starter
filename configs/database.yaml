default: sqlite

connections:
  pgsql:
    driver: postgres
    host: ${DB_HOST:localhost}
    port: ${DB_PORT:5432}
    database: ${DB_DATABASE:lunchbox_vending}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    charset: utf8
    prefix: ""
    schema: ${DB_SCHEMA:public}
    sslmode: ${DB_SSLMODE:disable}
    timezone: ${DB_TIMEZONE:Asia/Shanghai}
    options:
      "sslmode": "disable"
      "TimeZone": "Asia/Shanghai"

  mysql:
    driver: mysql
    host: ${DB_HOST:localhost}
    port: ${DB_PORT:3306}
    database: ${DB_DATABASE:lunchbox_vending}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    charset: utf8mb4
    collation: utf8mb4_unicode_ci
    prefix: ""
    strict: true
    timezone: ${DB_TIMEZONE:Asia/Shanghai}
    options:
      "charset": utf8mb4
      "parseTime": "true"
      "loc": "Asia/Shanghai"

  sqlite:
    driver: sqlite
    database: ${DB_DATABASE:./database/lunchbox_vending.sqlite}
    prefix: ""
    options:
      "journal_mode": "WAL"
      "synchronous": "NORMAL"
      "cache_size": 1000

pool:
  max_open_conns: 100
  max_idle_conns: 10
  conn_max_lifetime: 3600
  conn_max_idle_time: 600

read:
  hosts:
    - ${DB_READ_HOST_1:${DB_HOST:localhost}}
    - ${DB_READ_HOST_2:}
  port: ${DB_READ_PORT:${DB_PORT:3306}}
  username: ${DB_READ_USERNAME:${DB_USERNAME:root}}
  password: ${DB_READ_PASSWORD:${DB_PASSWORD:}}

write:
  host: ${DB_WRITE_HOST:${DB_HOST:localhost}}
  port: ${DB_WRITE_PORT:${DB_PORT:3306}}
  username: ${DB_WRITE_USERNAME:${DB_USERNAME:root}}
  password: ${DB_WRITE_PASSWORD:${DB_PASSWORD:}}

migrations:
  table: migrations
  path: ./database/migrations

seeders:
  path: ./database/seeders

redis:
  client: phpredis
  options:
    cluster: redis
    prefix: ${REDIS_PREFIX:fiber_starter_}
  default:
    url: ${REDIS_URL:}
    host: ${REDIS_HOST:127.0.0.1}
    username: ${REDIS_USERNAME:}
    password: ${REDIS_PASSWORD:}
    port: ${REDIS_PORT:6379}
    database: ${REDIS_DB:0}
