      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/resources.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/resources.APIResponse'
      summary: Set key expiration
      tags:
      - storage
  /api/storage/get/{key}:
    get:
      consumes:
      - application/json
      description: Get a value by key.
      parameters:
      - description: Storage key
        in: path
        name: key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/resources.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/resources.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/resources.APIResponse'
      summary: Get key
      tags:
      - storage
  /api/storage/reset:
    post:
      consumes:
      - application/json
      description: Delete all stored data.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/resources.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/resources.APIResponse'
      summary: Reset storage
      tags:
      - storage
  /api/storage/set:
    post:
      consumes:
      - application/json
      description: Store a key-value pair.
      parameters:
      - description: Set key payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/controllers.SetKeyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/resources.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/resources.APIResponse'
      summary: Set key
      tags:
      - storage
  /api/users:
    get:
      consumes:
      - application/json
      description: Get a paginated list of users (admin only).
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
