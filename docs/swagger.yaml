        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/resources.APIResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/resources.APIResponse'
      security:
      - ApiKeyAuth: []
      summary: Get user
      tags:
      - Users
    put:
      consumes:
      - application/json
      description: Update a user by ID (admin only).
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      - description: Update user payload
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/controllers.UpdateProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/resources.APIResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/resources.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/resources.APIResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/resources.APIResponse'
      security:
      - ApiKeyAuth: []
