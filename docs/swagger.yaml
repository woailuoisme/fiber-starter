definitions:
  controllers.ChangePasswordRequest:
    properties:
      current_password:
        type: string
      new_password:
        minLength: 6
        type: string
    required:
    - current_password
    - new_password
    type: object
  controllers.ConfirmResetPasswordRequest:
    properties:
      password:
        minLength: 6
        type: string
      token:
        type: string
    required:
    - password
    - token
    type: object
  controllers.LoginRequest:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: password123
        type: string
    required:
    - email
    - password
    type: object
  controllers.RefreshTokenRequest:
    properties:
      refresh_token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
    required:
    - refresh_token
    type: object
  controllers.RegisterRequest:
    properties:
      email:
        example: user@example.com
        type: string
      name:
        example: Alice
        maxLength: 100
        minLength: 2
        type: string
      password:
        example: password123
        minLength: 6
        type: string
    required:
    - email
    - name
    - password
    type: object
  controllers.ResetPasswordRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  controllers.UpdateProfileRequest:
    properties:
      avatar:
        example: https://example.com/avatar.jpg
        type: string
      name:
        example: Alice
        maxLength: 100
        minLength: 2
        type: string
      phone:
        example: "+8613800138000"
        type: string
    type: object
  resources.APIResponse:
    properties:
      code:
        type: integer
      data: {}
      debugger:
        $ref: '#/definitions/resources.Debugger'
      errors: {}
      message:
        type: string
      success:
        type: boolean
    type: object
  resources.Debugger:
    properties:
      exception:
        type: string
      file:
        type: string
      line:
        type: integer
      memory_usage:
        type: string
      query_count:
        type: integer
      request_time:
        description: milliseconds
        type: number
      trace:
        items:
          type: string
        type: array
    type: object
info:
  contact: {}
paths:
  /api/me:
    get:
      consumes:
      - application/json
      description: 获取当前认证用户的详细信息。
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            $ref: '#/definitions/resources.APIResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/resources.APIResponse'
        "404":
          description: 用户不存在
          schema:
            $ref: '#/definitions/resources.APIResponse'
      security:
      - ApiKeyAuth: []
      summary: 获取当前登录用户信息
      tags:
      - 资料
  /api/users:
    get:
      consumes:
      - application/json
      description: 获取分页用户列表（仅管理员可用）。
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 10
        description: 每页数量
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            $ref: '#/definitions/resources.APIResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/resources.APIResponse'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/resources.APIResponse'
      security:
      - ApiKeyAuth: []
      summary: 获取用户列表
      tags:
      - 用户
  /api/users/{id}:
    delete:
      consumes:
      - application/json
      description: 根据 ID 删除用户（仅管理员可用）。
      parameters:
      - description: 用户 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            $ref: '#/definitions/resources.APIResponse'
        "400":
          description: 用户 ID 无效
          schema:
            $ref: '#/definitions/resources.APIResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/resources.APIResponse'
        "404":
          description: 用户不存在
          schema:
            $ref: '#/definitions/resources.APIResponse'
      security:
      - ApiKeyAuth: []
      summary: 删除用户
      tags:
      - 用户
    get:
      consumes:
      - application/json
      description: 根据 ID 获取用户详情（仅管理员可用）。
      parameters:
      - description: 用户 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            $ref: '#/definitions/resources.APIResponse'
        "400":
          description: 用户 ID 无效
          schema:
            $ref: '#/definitions/resources.APIResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/resources.APIResponse'
        "404":
          description: 用户不存在
          schema:
            $ref: '#/definitions/resources.APIResponse'
      security:
      - ApiKeyAuth: []
      summary: 获取单个用户
      tags:
      - 用户
    put:
      consumes:
      - application/json
      description: 根据 ID 更新用户信息（仅管理员可用）。
      parameters:
      - description: 用户 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 更新用户参数
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/controllers.UpdateProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            $ref: '#/definitions/resources.APIResponse'
        "400":
          description: 请求错误
          schema:
            $ref: '#/definitions/resources.APIResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/resources.APIResponse'
        "404":
          description: 用户不存在
          schema:
            $ref: '#/definitions/resources.APIResponse'
      security:
      - ApiKeyAuth: []
      summary: 更新用户信息
      tags:
      - 用户
  /api/users/search:
    get:
      consumes:
      - application/json
      description: 根据关键词搜索用户（仅管理员可用）。
      parameters:
      - description: 搜索关键词
        in: query
        name: q
        required: true
        type: string
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 10
        description: 每页数量
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            $ref: '#/definitions/resources.APIResponse'
        "400":
          description: 请求错误
          schema:
            $ref: '#/definitions/resources.APIResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/resources.APIResponse'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/resources.APIResponse'
      security:
      - ApiKeyAuth: []
      summary: 搜索用户
      tags:
      - 用户
  /api/v1/auth/change-password:
    post:
      consumes:
      - application/json
      description: 修改当前登录用户的密码。
      parameters:
      - description: 修改密码参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/controllers.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            $ref: '#/definitions/resources.APIResponse'
        "400":
          description: 请求错误
          schema:
            $ref: '#/definitions/resources.APIResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/resources.APIResponse'
      security:
      - ApiKeyAuth: []
      summary: 修改密码
      tags:
      - 认证
  /api/v1/auth/confirm-reset-password:
    post:
      consumes:
      - application/json
      description: 使用重置令牌设置新密码。
      parameters:
      - description: 确认重置密码参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/controllers.ConfirmResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            $ref: '#/definitions/resources.APIResponse'
        "400":
          description: 请求错误
          schema:
            $ref: '#/definitions/resources.APIResponse'
      summary: 确认重置密码
      tags:
      - 认证
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: 验证用户身份并返回令牌。
      parameters:
      - description: 登录参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/controllers.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            $ref: '#/definitions/resources.APIResponse'
        "400":
          description: 请求错误
          schema:
            $ref: '#/definitions/resources.APIResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/resources.APIResponse'
      summary: 用户登录
      tags:
      - 认证
  /api/v1/auth/logout:
    post:
      consumes:
      - application/json
      description: 退出当前登录用户。
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            $ref: '#/definitions/resources.APIResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/resources.APIResponse'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/resources.APIResponse'
      security:
      - ApiKeyAuth: []
      summary: 用户登出
      tags:
      - 认证
  /api/v1/auth/profile:
    get:
      consumes:
      - application/json
      description: 获取当前登录用户的资料。
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            $ref: '#/definitions/resources.APIResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/resources.APIResponse'
      security:
      - ApiKeyAuth: []
      summary: 获取当前用户资料
      tags:
      - 认证
  /api/v1/auth/refresh:
    post:
      consumes:
      - application/json
      description: 使用刷新令牌换取新的访问令牌。
      parameters:
      - description: 刷新令牌参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/controllers.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            $ref: '#/definitions/resources.APIResponse'
        "400":
          description: 请求错误
          schema:
            $ref: '#/definitions/resources.APIResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/resources.APIResponse'
      summary: 刷新令牌
      tags:
      - 认证
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      description: 创建一个新的用户账号。
      parameters:
      - description: 注册参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/controllers.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: 创建成功
          schema:
            $ref: '#/definitions/resources.APIResponse'
        "400":
          description: 请求错误
          schema:
            $ref: '#/definitions/resources.APIResponse'
        "409":
          description: 邮箱已被注册
          schema:
            $ref: '#/definitions/resources.APIResponse'
      summary: 用户注册
      tags:
      - 认证
  /api/v1/auth/reset-password:
    post:
      consumes:
      - application/json
      description: 发送密码重置邮件。
      parameters:
      - description: 重置密码参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/controllers.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            $ref: '#/definitions/resources.APIResponse'
        "400":
          description: 请求错误
          schema:
            $ref: '#/definitions/resources.APIResponse'
      summary: 重置密码
      tags:
      - 认证
  /api/v1/users/profile:
    put:
      consumes:
      - application/json
      description: 更新当前登录用户的个人资料。
      parameters:
      - description: 更新个人资料参数
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/controllers.UpdateProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            $ref: '#/definitions/resources.APIResponse'
        "400":
          description: 请求错误
          schema:
            $ref: '#/definitions/resources.APIResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/resources.APIResponse'
      security:
      - ApiKeyAuth: []
      summary: 更新个人资料
      tags:
      - 用户
swagger: "2.0"
