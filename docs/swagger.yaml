definitions:
  controllers.ChangePasswordRequest:
    properties:
      current_password:
        type: string
      new_password:
        minLength: 6
        type: string
    required:
    - current_password
    - new_password
    type: object
  controllers.ConfirmResetPasswordRequest:
    properties:
      password:
        minLength: 6
        type: string
      token:
        type: string
    required:
    - password
    - token
    type: object
  controllers.LoginRequest:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: password123
        type: string
    required:
    - email
    - password
    type: object
  controllers.RefreshTokenRequest:
    properties:
      refresh_token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
    required:
    - refresh_token
    type: object
  controllers.RegisterRequest:
    properties:
      email:
        example: user@example.com
        type: string
      name:
        example: Alice
        maxLength: 100
        minLength: 2
        type: string
      password:
        example: password123
        minLength: 6
        type: string
    required:
    - email
    - name
    - password
    type: object
  controllers.ResetPasswordRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  controllers.SetExpireRequest:
    properties:
      key:
        type: string
      ttl:
        description: Expiration in seconds.
        type: integer
    required:
    - key
    - ttl
    type: object
  controllers.SetKeyRequest:
    properties:
      key:
        type: string
      ttl:
        description: Expiration in seconds. 0 uses the default TTL.
        type: integer
      value:
        type: string
    required:
    - key
    - value
    type: object
  controllers.UpdateProfileRequest:
    properties:
      avatar:
        example: https://example.com/avatar.jpg
        type: string
      name:
        example: Alice
        maxLength: 100
        minLength: 2
        type: string
      phone:
        example: "+8613800138000"
        type: string
    type: object
  resources.APIResponse:
    properties:
      code:
        type: integer
      data: {}
      debugger:
        $ref: '#/definitions/resources.Debugger'
      errors: {}
      message:
        type: string
      success:
        type: boolean
    type: object
  resources.Debugger:
    properties:
      exception:
        type: string
      file:
        type: string
      line:
        type: integer
      memory_usage:
        type: string
      query_count:
        type: integer
      request_time:
        description: milliseconds
        type: number
      trace:
        items:
          type: string
        type: array
    type: object
info:
  contact: {}
paths:
  /api/me:
    get:
      consumes:
      - application/json
      description: Get the current authenticated user's details.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/resources.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/resources.APIResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/resources.APIResponse'
      security:
      - ApiKeyAuth: []
      summary: Get current user
      tags:
      - Profile
  /api/storage/delete/{key}:
    delete:
      consumes:
      - application/json
      description: Delete a value by key.
      parameters:
      - description: Storage key
        in: path
        name: key
        required: true
