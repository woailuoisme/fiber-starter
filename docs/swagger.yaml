      summary: Delete key
      tags:
      - storage
  /api/storage/exists/{key}:
    get:
      consumes:
      - application/json
      description: Check whether a key exists.
      parameters:
      - description: Storage key
        in: path
        name: key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/resources.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/resources.APIResponse'
      summary: Check key existence
