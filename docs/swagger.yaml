        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/resources.APIResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/resources.APIResponse'
      security:
      - ApiKeyAuth: []
      summary: Delete user
      tags:
      - Users
    get:
      consumes:
      - application/json
      description: Get a user by ID (admin only).
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      produces:
