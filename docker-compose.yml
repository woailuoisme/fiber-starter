version: '3.8'

services:
  # PostgreSQL 数据库
  db:
    image: postgres:15-alpine
    container_name: fiber_starter_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: fiber_starter
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Redis 缓存/队列
  redis:
    image: redis:7-alpine
    container_name: fiber_starter_redis
    restart: always
    ports:
      - "46379:6379"
    command: redis-server --requirepass redis_secret
    volumes:
      - redis_data:/data

  # MinIO 对象存储 (S3 兼容)
  minio:
    image: minio/minio:latest
    container_name: fiber_starter_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # Meilisearch 搜索引擎 (可选)
  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: fiber_starter_meilisearch
    restart: always
    environment:
      MEILI_MASTER_KEY: meili_master_key
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data

volumes:
  postgres_data:
  redis_data:
  minio_data:
  meili_data:
