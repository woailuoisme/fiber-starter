services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: fiber-starter:local
    container_name: fiber-starter
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_PORT: ${APP_PORT:-8080}
      APP_HOST: ${APP_HOST:-0.0.0.0}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${APP_PORT:-8080}:8080"
    restart: always